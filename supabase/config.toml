# A string used to distinguish different Supabase projects on the same host.
project_id = "sprinta"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Üretimde SITE_URL = "https://sprinta.app" | Geliştirmede = "http://127.0.0.1:3000"
site_url = "env(SITE_URL)"
# APP_REDIRECT_URL = expo deep-link scheme, ör. "app.sprinta.mobile://auth/callback"
additional_redirect_urls = ["env(SITE_URL)", "env(APP_REDIRECT_URL)"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# ── Resend SMTP (üretim) ───────────────────────────────────────────────────
# Supabase CLI config.toml SMTP'yi desteklemiyor; üretim SMTP ayarları
# Supabase Dashboard → Authentication → SMTP Settings bölümünden yapılır:
#   Host:     smtp.resend.com
#   Port:     587
#   Username: resend
#   Password: <Resend API Key>
#   Sender:   noreply@sprinta.app

[auth.sms]
enable_signup = false
enable_confirmations = false
